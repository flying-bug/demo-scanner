<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Barcode Scanner Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <h1>Barcode Scanner — Demo</h1>

        <section class="scanner">
            <div class="video-wrapper">
                <video id="video" playsinline muted></video>
                <div class="scan-overlay">
                    <div class="scan-area"></div>
                </div>
            </div>

            <div class="controls">
                <div class="top-instruction">
                    <strong>Quét mã vạch</strong>
                    <p>Hãy bấm "Bật camera" và hướng camera vào mã. Đặt mã vào khung vuông.</p>
                </div>

                <form id="scanForm" action="#" onsubmit="return false;">
                    <label for="barcodeInput" class="sr-only">Mã đã quét</label>
                    <input id="barcodeInput" autocomplete="off" placeholder="Mã vạch sẽ hiện ở đây" />
                    <div class="btn-row">
                        <button id="startCamera" class="primary">Bật camera</button>
                        <button id="stopCamera" disabled> Tắt camera</button>
                    </div>
                    <button id="submitBtn" class="submit">Xử lý</button>
                    <div class="upload-row">
                        <label class="upload-label">Hoặc tải ảnh chứa mã vạch</label>
                        <input id="fileInput" type="file" accept="image/*" />
                    </div>
                </form>

                <p id="status" class="status" aria-live="polite"></p>
                <div id="productInfo" class="product-info" aria-live="polite">
                    <h2 id="productName">Không có sản phẩm</h2>
                    <p id="productPrice"></p>
                    <img id="productImage" src="" alt=""
                        style="display:none; max-width:200px; border-radius:8px; margin-top:8px" />
                </div>
                <div id="scanHistory" class="scan-history" aria-live="polite">
                    <h3>Lịch sử quét</h3>
                    <ul id="historyList"></ul>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
    <script src="scanner.js"></script>
</body>

</html>
